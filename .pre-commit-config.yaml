# T0.2 — Vitrina pre-commit hooks.
#
# Install (once per clone):
#   cd backend && poetry install --with dev
#   poetry run pre-commit install
#
# `default_install_hook_types` registers both pre-commit and commit-msg
# stages, so the single `pre-commit install` above wires up both. To run
# every hook manually against the whole repo:
#   poetry run pre-commit run --all-files

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false

repos:
  # ---- General hygiene -----------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Canon JSX prototypes are mirrored byte-identical from the handoff
      # archive (`docs/handoff/specs/04_typography.md §9.1` requires it).
      # Trailing-whitespace / EOF-newline normalization would drift them
      # from the upstream reference, so we exempt the dir from the
      # whitespace hooks. Same dir is also opted out of eslint/prettier
      # for the same reason (see landing/eslint.config.mjs).
      - id: trailing-whitespace
        exclude: ^backend/poetry\.lock$|^landing/package-lock\.json$|^landing/tests/visual/canon-source/|^packages/canon/dist/|^packages/canon/package-lock\.json$
      - id: end-of-file-fixer
        exclude: ^backend/poetry\.lock$|^landing/package-lock\.json$|^landing/tests/visual/canon-source/|^packages/canon/dist/|^packages/canon/package-lock\.json$
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        # Generated lockfiles are large but tracked intentionally.
        # Visual regression baselines (PNG screenshots @ desktop 1440) can
        # exceed 500 KB when a section is content-heavy (Examples, Story).
        # Regen is a deliberate `npm run test:visual:update` op and PRs
        # touching the dir get human review — the size limit guards against
        # accidental commits of build artefacts / binaries, not these.
        exclude: ^backend/poetry\.lock$|^landing/package-lock\.json$|^landing/tests/visual/baselines/.*\.png$|^packages/canon/dist/|^packages/canon/package-lock\.json$
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---- Secret scanning (defence in depth, two independent scanners) --------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        # `tests/visual/canon-source/` hosts the design handoff prototypes
        # which include `<script integrity="sha384-…">` SRI hashes. Those
        # are public CDN integrity attestations, not secrets — detect-secrets
        # flags them as Base64 high-entropy strings.
        exclude: ^backend/poetry\.lock$|^landing/package-lock\.json$|\.secrets\.baseline$|^landing/tests/visual/canon-source/

  # ---- Conventional commits (commit-msg stage) -----------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, test, refactor, style, perf, build, ci]

  # ---- Local Python hooks (single source of truth = poetry env) ------------
  # All Python tooling runs through poetry so versions match pyproject.toml.
  # `pass_filenames: false` is intentional: ruff/mypy/bandit are project-wide
  # and benefit from caches; per-file invocation would be slower and break
  # mypy's import resolution.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (backend)
        language: system
        files: ^backend/.+\.py$
        entry: bash -c 'cd backend && poetry run ruff check'
        pass_filenames: false

      - id: ruff-format
        name: ruff format --check (backend)
        language: system
        files: ^backend/.+\.py$
        entry: bash -c 'cd backend && poetry run ruff format --check'
        pass_filenames: false

      - id: mypy
        name: mypy --strict (backend)
        language: system
        files: ^backend/app/.+\.py$
        entry: bash -c 'cd backend && poetry run mypy app'
        pass_filenames: false

      - id: bandit
        name: bandit (backend)
        language: system
        files: ^backend/app/.+\.py$
        entry: bash -c 'cd backend && poetry run bandit -r app -ll -c pyproject.toml'
        pass_filenames: false

      - id: import-linter
        name: import-linter (backend hexagonal + forbidden-imports contracts)
        language: system
        files: ^backend/(app|.importlinter).*
        entry: bash -c 'cd backend && poetry run lint-imports'
        pass_filenames: false

  # ---- Local Node hooks (landing) ------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint (landing)
        language: system
        files: ^landing/.+\.(ts|tsx|js|jsx|mjs)$
        entry: bash -c 'cd landing && npx eslint --max-warnings 0 .'
        pass_filenames: false

      - id: prettier
        name: prettier --check (landing)
        language: system
        files: ^landing/.+\.(ts|tsx|js|jsx|mjs|json|css|md|mdx|html)$
        exclude: ^landing/package-lock\.json$
        entry: bash -c 'cd landing && npx prettier --check .'
        pass_filenames: false
