# Minimal Redis config for the dev compose. Production tuning happens in T0.3.
# Hardening notes (SECURITY.md A02): in production we additionally enforce
# `requirepass` from a Docker secret and `bind 127.0.0.1` to the internal
# bridge. The dev profile keeps no password to simplify local work.

bind 0.0.0.0
protected-mode no
appendonly yes
appendfsync everysec
maxmemory 256mb
maxmemory-policy allkeys-lru
