# Vitrina — production-shape stack.
# Per ADR-0002 (modular monolith) and SECURITY.md §2 boundaries:
#   - postgres + redis isolated on `internal_net` (no host port exposure here;
#     `docker-compose.dev.yml` opens them for local tooling)
#   - parser-worker and content-worker live on `parser_net` only — they
#     communicate with the queue (redis) but have NO route to postgres
#   - api, sync-worker, tg-bot live on `internal_net` with DB access
#
# Run with:  make dev          (adds docker-compose.dev.yml overrides)
# Or:        docker compose --env-file ../.env -f infra/docker-compose.yml up -d
#
# All container env comes from the repo-root `.env` (cp .env.example .env first).

x-build: &backend-build
  # Repo root as the build context so the backend image can `COPY ./sites-template`
  # for the T2.3 publisher (the Jinja2 customer-site templates live next to
  # backend/, not inside it). Dockerfile paths are `./backend/...` accordingly.
  context: ..
  dockerfile: backend/Dockerfile

x-restart: &restart
  restart: unless-stopped

x-worker-hardening: &worker-hardening
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  read_only: false  # workers need to write Playwright caches + tempfiles

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitrina}
      POSTGRES_USER: ${POSTGRES_USER:-vitrina_migrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      # Passwords consumed by infra/postgres/init/01_roles.sh on first boot.
      VITRINA_APP_PASSWORD: ${VITRINA_APP_PASSWORD:?VITRINA_APP_PASSWORD required}
      VITRINA_READONLY_PASSWORD: ${VITRINA_READONLY_PASSWORD:?VITRINA_READONLY_PASSWORD required}
      VITRINA_AUDIT_WRITER_PASSWORD: ${VITRINA_AUDIT_WRITER_PASSWORD:?VITRINA_AUDIT_WRITER_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [internal_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *restart

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    # Redis straddles both networks intentionally: it is the only bridge
    # between the api and the isolated workers (see ARCHITECTURE.md §4
    # "Communication summary" — workers ↔ API only via Redis-queues).
    networks: [internal_net, parser_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    <<: *restart

  api:
    build: *backend-build
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: [../.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal_net]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    <<: *restart

  parser-worker:
    build: *backend-build
    command: ["python", "-m", "app.workers.parser"]
    env_file: [../.env]
    depends_on:
      redis: { condition: service_healthy }
    # No internal_net — workers MUST NOT be able to reach postgres.
    # Verification: `docker compose exec parser-worker nc -w2 postgres 5432`
    # should fail (name not resolvable on parser_net).
    networks: [parser_net]
    <<: [*restart, *worker-hardening]

  content-worker:
    build: *backend-build
    command: ["python", "-m", "app.workers.content"]
    env_file: [../.env]
    depends_on:
      redis: { condition: service_healthy }
    networks: [parser_net]
    <<: [*restart, *worker-hardening]

  sync-worker:
    build: *backend-build
    command: ["python", "-m", "app.workers.sync"]
    env_file: [../.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [internal_net]
    <<: *restart

  tg-bot:
    build: *backend-build
    command: ["python", "-m", "app.bot.main"]
    env_file: [../.env]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal_net]
    <<: *restart

  landing:
    build:
      context: ../landing
      dockerfile: Dockerfile
      # Public Next env vars are baked into the static bundle at build
      # time — see landing/Dockerfile for the why. Each ARG declared
      # there must be forwarded here so `docker compose build` pulls
      # the value from the project's .env. Empty values are valid.
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://samosite.online}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-}
        NEXT_PUBLIC_YANDEX_VERIFICATION: ${NEXT_PUBLIC_YANDEX_VERIFICATION:-}
        NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_CLIENT_KEY: ${NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_CLIENT_KEY:-}
        # Build-version stamps — рендерятся в `<meta x-build-version>` и
        # `GET /version` для freshness-проверок. Резолвятся в `deploy.sh`
        # из `git rev-parse --short HEAD` + `date -u +%Y-%m-%dT%H:%M:%SZ`.
        # Fallback `dev` / empty ок для локального `make dev`.
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
    env_file: [../.env]
    networks: [internal_net]
    <<: *restart

  caddy:
    build:
      context: caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      STATIC_ORIGIN_URL: ${STATIC_ORIGIN_URL:-https://storage.yandexcloud.net/vitrina-prod}
      STATIC_ORIGIN_HOST: ${STATIC_ORIGIN_HOST:-storage.yandexcloud.net}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Wildcard cert files written by the acme sidecar.
      - acme_certs:/etc/caddy/certs:ro
    depends_on:
      - api
      - landing
    networks: [internal_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    <<: *restart

  acme:
    # acme.sh sidecar that issues + renews the *.samosite.online wildcard
    # cert via Selectel DNS-01 (the caddy-dns/selectel Caddy plugin is
    # currently broken against libdns 1.x — see infra/caddy/Dockerfile).
    build:
      context: acme
      dockerfile: Dockerfile
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL required for Let's Encrypt}
      ACME_DOMAIN: ${ACME_DOMAIN:-*.samosite.online}
      ACME_DOMAIN_ROOT: ${ACME_DOMAIN_ROOT:-samosite.online}
      # acme.sh's Selectel DNS provider reads SEL_TOKEN; we map our env
      # var so the rest of the stack uses the same SELECTEL_DNS_API_TOKEN
      # name as everything else (see .env.example).
      SEL_TOKEN: ${SELECTEL_DNS_API_TOKEN:?SELECTEL_DNS_API_TOKEN required}
    volumes:
      - acme_state:/acme.sh
      - acme_certs:/certs
      - ./acme/issue.sh:/scripts/issue.sh:ro
    # acme.sh's default CMD runs the renewal cron daemon (`crond`). One-
    # time issuance: `docker compose run --rm acme /scripts/issue.sh`.
    networks: [internal_net]
    <<: *restart

networks:
  internal_net:
    driver: bridge
  parser_net:
    driver: bridge
    # `internal: false` because parser/content workers need outbound HTTPS
    # to YandexGPT, YMaps Geosearch, Telegram, etc. The isolation is from
    # postgres (which is on internal_net only), not from the internet.

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  acme_state:
  acme_certs:
