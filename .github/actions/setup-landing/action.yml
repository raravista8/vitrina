name: Setup landing
description: >-
  Install Node 20 + cached npm dependencies from landing/package-lock.json.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: landing/package-lock.json

    - name: Install landing dependencies
      shell: bash
      working-directory: landing
      run: npm ci --no-audit --no-fund
