name: Setup landing
description: >-
  Install Node 20 + cached npm dependencies from landing/package-lock.json.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: landing/package-lock.json

    - name: Install landing dependencies
      shell: bash
      working-directory: landing
      # --install-links materialises `file:` deps as copies (not symlinks).
      # `@samosite/canon` is a workspace `file:../packages/canon` dep;
      # turbopack's peer-dep resolver doesn't follow symlinks (it looks
      # for `react` from the canon package's PHYSICAL path), so without
      # --install-links the Next build fails with `Cannot find package
      # 'react'`. Same flag also lets Vitest resolve canon's dist properly.
      run: npm ci --install-links --no-audit --no-fund
