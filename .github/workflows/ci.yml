name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight PR runs when a new commit lands; keep main runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---- Backend -------------------------------------------------------------

  backend-lint:
    name: backend / ruff + import-linter
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
      - name: ruff check
        working-directory: backend
        run: poetry run ruff check
      - name: ruff format --check
        working-directory: backend
        run: poetry run ruff format --check
      - name: import-linter (hexagonal + forbidden-imports contracts)
        working-directory: backend
        run: poetry run lint-imports

  backend-typecheck:
    name: backend / mypy --strict
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
      - name: mypy --strict
        working-directory: backend
        run: poetry run mypy app

  backend-test:
    name: backend / pytest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
      - name: pytest (unit + integration + security)
        working-directory: backend
        run: poetry run pytest -m "not e2e and not slow"

  # ---- Landing -------------------------------------------------------------

  landing-lint:
    name: landing / eslint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-landing
      - working-directory: landing
        run: npm run lint

  landing-typecheck:
    name: landing / tsc --noEmit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-landing
      - working-directory: landing
        run: npm run typecheck

  landing-test:
    name: landing / vitest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-landing
      - working-directory: landing
        run: npm test

  # ---- Infra ---------------------------------------------------------------

  compose-validate:
    name: infra / docker compose config
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Seed .env from example so compose substitution succeeds
        run: cp .env.example .env
      - name: Seed Caddy cert stubs (Caddyfile references them)
        run: |
          mkdir -p /tmp/caddy-certs
          openssl req -x509 -newkey rsa:2048 -days 1 -nodes \
            -keyout /tmp/caddy-certs/key.pem \
            -out /tmp/caddy-certs/fullchain.pem \
            -subj "/CN=*.vitrina.site"
      - name: Validate compose YAML (dev + prod profiles merged)
        run: |
          docker compose \
            --env-file .env \
            -f infra/docker-compose.yml \
            -f infra/docker-compose.dev.yml \
            config --quiet
      - name: Validate production Caddyfile syntax
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/infra/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v /tmp/caddy-certs:/etc/caddy/certs:ro \
            -e STATIC_ORIGIN_URL=https://example.com \
            -e STATIC_ORIGIN_HOST=example.com \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile
      - name: Validate dev Caddyfile syntax
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE/infra/Caddyfile.dev:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile
