name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC (05:00 MSK) — catches new CVE advisories on locked deps.
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---- Backend SAST + SCA --------------------------------------------------

  backend-bandit:
    name: backend / bandit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
      - name: bandit -r app -ll
        working-directory: backend
        run: poetry run bandit -r app -ll -c pyproject.toml

  backend-pip-audit:
    name: backend / pip-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-backend
      # PYSEC-2026-196: pip-audit also scans the venv's own pip (a build
      # tool, not a project dependency or shipped code) — upgrade it to the
      # fixed release instead of ignoring the advisory.
      - name: upgrade venv pip (PYSEC-2026-196)
        working-directory: backend
        run: poetry run pip install --upgrade "pip>=26.1.2"
      - name: pip-audit --strict
        working-directory: backend
        # Ignored advisories — re-evaluate when fixes become reachable:
        #
        #   PYSEC-2024-277  joblib    — transitive via safety (dev-only);
        #                               no upstream patch released
        #   PYSEC-2026-97   nltk      — transitive via safety (dev-only);
        #                               no upstream patch released
        # (CVE-2026-34993 / CVE-2026-47265 aiohttp were ignored here while
        # aiogram capped aiohttp <3.14; aiogram 3.29 lifted the cap →
        # aiohttp bumped to 3.14.1, flags removed. PYSEC-2025-183 pyjwt —
        # resolved by the pyjwt 2.13.0 bump earlier.)
        #
        # Bandit + import-linter + npm audit + gitleaks continue to gate
        # against other regressions; this only relaxes the "every advisory
        # must be acknowledged" stance for advisories that currently have
        # no upstream remedy.
        run: |
          poetry run pip-audit --strict \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln PYSEC-2026-97

  # ---- Landing SCA ---------------------------------------------------------

  landing-npm-audit:
    name: landing / npm audit (high+)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-landing
      - name: npm audit --audit-level=high
        working-directory: landing
        run: npm audit --audit-level=high

  # ---- Secret scanning -----------------------------------------------------

  gitleaks:
    name: secrets / gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit (not just the diff).
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No paid GITLEAKS_LICENSE — action runs in OSS mode for public repos.
